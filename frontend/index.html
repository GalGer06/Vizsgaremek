<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='0.9em' font-size='56'%3E%F0%9F%8C%8D%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Környezetvédelem duolingo 2.0</title>
    <link
  href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
  rel="stylesheet"
/>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        if (!window.google?.translate?.TranslateElement) {
          console.log('Google Translate not loaded yet, waiting...');
          setTimeout(googleTranslateElementInit, 100);
          return;
        }
        new google.translate.TranslateElement({
          pageLanguage: 'hu',
          includedLanguages: 'en,hu',
          autoDisplay: false
        }, 'google_translate_element_hidden');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async defer></script>
    <style>
      /* Hide the original Google components and set z-index to 0 */
      #google_translate_element_hidden, 
      .goog-te-gadget,
      .goog-te-gadget-simple,
      .skiptranslate {
        position: absolute !important;
        top: -1000px !important;
        left: -1000px !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
      
      /* Hide the top translation banner and ensure body stays at top */
      .goog-te-banner-frame,
      iframe[class*="goog-te-banner-frame"],
      #goog-gt-tt,
      .goog-tooltip,
      .goog-tooltip:hover {
        display: none !important;
        visibility: hidden !important;
      }
      
      body {
        top: 0 !important;
        position: static !important;
      }
      
      /* Prevent Google from adding padding to body */
      .translated-ltr {
        margin-top: 0 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
